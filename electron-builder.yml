appId: com.sgecentenario.app
productName: SGE CENTENARIO
copyright: Copyright © 2026 SGE CENTENÁRIO

directories:
  buildResources: build
  output: dist

files:
  - electron/**/*
  - client/build/**/*
  - server/**/*
  - package.json
  - "!**/{.git,.gitignore,.gitattributes,README.md}"
  - "!client/src"
  - "!client/public"
  - "!client/node_modules"
  - "!server/node_modules"
  - "!{.env,.env.*}"

extraResources:
  - from: server
    to: server
    filter:
      - "**/*"
  - from: verificar-instalacao.bat
    to: verificar-instalacao.bat
  - from: iniciar-app.bat
    to: iniciar-app.bat
  - from: iniciar-app.bat
    to: iniciar-app.bat

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: SGE CENTENARIO
  installerIcon: build/installerIcon.ico
  uninstallerIcon: build/installerIcon.ico
  deleteAppDataOnUninstall: false
  perMachine: false

  include: build/installer.nsh

publish:
  provider: github
  owner: RODRIGOGRILLOMOREIRA
  repo: ANALISADOR-DE-NOTAS-E-HABILIDADES
  private: true
  releaseType: release

artifactName: ${productName}-Setup-${version}.${ext}

compression: normal

asar: true
asarUnpack:
  - "**/*.node"
  - "server/**/*"
